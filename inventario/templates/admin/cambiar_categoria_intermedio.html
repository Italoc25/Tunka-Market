{% extends "admin/base_site.html" %}

{% block content %}
<p>Selecciona el nuevo departamento para los siguientes productos:</p>
<form method="post">
    {% csrf_token %}
    {{ media }}
    
    {% for obj in productos %}
        <input type="hidden" name="_selected_action" value="{{ obj.pk }}" />
    {% endfor %}

    <select name="categoria" required>
        {% for cat in categorias %}
            <option value="{{ cat.id }}">{{ cat.nombre }}</option>
        {% endfor %}
    </select>

    <input type="hidden" name="action" value="cambiar_categoria_masivo" />
    <input type="submit" name="apply" value="Actualizar Departamento" />
</form>

<ul>
    {% for obj in productos %}
        <li>{{ obj.nombre }}</li>
    {% endfor %}
</ul>
{% endblock %}
