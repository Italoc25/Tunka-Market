<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
        
        <script>
            let lastResult = null;
            let countResults = 0;
            let track = null;
            let scannerLoop = null; // Para el motor nativo de Android

            // --- TUS FUNCIONES ORIGINALES (SIN CAMBIOS) ---
            function playBeep() {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.2);
                } catch (e) { }
            }

            function validarCodigo(codigo) {
                if (!/^\d+$/.test(codigo)) return false;
                let cadena = (codigo.length === 12) ? "0" + codigo : codigo;
                if (cadena.length === 8 || cadena.length === 13) {
                    let sum = 0;
                    let reverseCode = cadena.split('').reverse();
                    for (let i = 1; i < reverseCode.length; i++) {
                        let n = parseInt(reverseCode[i]);
                        sum += (i % 2 === 0) ? n * 1 : n * 3;
                    }
                    let checkCalculado = (10 - (sum % 10)) % 10;
                    return checkCalculado === parseInt(reverseCode[0]);
                }
                return false;
            }

            function buscarPrecio(codigo) {
                if (!codigo) return;
                
                // Detenemos ambos posibles motores
                try { Quagga.stop(); } catch(e) { }
                if (scannerLoop) cancelAnimationFrame(scannerLoop);
                
                const panel = document.getElementById('resultado-panel');
                const scanner = document.getElementById('scanner-section');
                const resNombre = document.getElementById('res-nombre');
                const resPrecio = document.getElementById('res-precio');
                const resCate = document.getElementById('res-categoria');
                const resIcon = document.getElementById('res-icon');

                scanner.style.display = 'none';
                panel.style.display = 'block';
                resNombre.innerText = "Buscando...";
                resPrecio.innerText = "";

                fetch(`/api/producto/${codigo}/`)
                    .then(response => response.json())
                    .then(data => {
                        playBeep();
                        if (data.success) {
                            resNombre.innerText = data.nombre;
                            resPrecio.innerText = "$" + data.precio;
                            resPrecio.className = "display-1 fw-bold text-success mb-0";
                            resCate.innerText = data.categoria;
                            resCate.className = "badge bg-primary text-white fs-5 px-3 py-2";
                            resIcon.className = "bi bi-check-circle-fill text-success display-4";
                        } else {
                            resNombre.innerText = "No encontrado";
                            resPrecio.innerText = "X";
                            resPrecio.className = "display-1 fw-bold text-danger mb-0";
                            resCate.innerText = "Código: " + codigo;
                            resCate.className = "badge bg-danger text-white fs-5 px-3 py-2";
                            resIcon.className = "bi bi-exclamation-triangle-fill text-danger display-4";
                        }
                    })
                    .catch(e => { resNombre.innerText = "Error de conexión"; });
            }

            // --- MOTOR NUEVO: DETECTOR NATIVO (EL CAMBIO CLAVE PARA ANDROID) ---
            async function iniciarLectorNativo() {
                const container = document.querySelector('#interactive');
                const video = document.createElement('video');
                video.style.width = "100%";
                video.style.height = "100%";
                video.style.objectFit = "cover";
                video.setAttribute('autoplay', '');
                video.setAttribute('playsinline', '');
                container.appendChild(video);

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    video.srcObject = stream;
                    track = stream.getVideoTracks()[0];
                    initCameraCapabilities();

                    const barcodeDetector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a'] });
                    
                    const render = async () => {
                        if (video.readyState === video.HAVE_ENOUGH_DATA) {
                            const barcodes = await barcodeDetector.detect(video);
                            if (barcodes.length > 0) {
                                let code = barcodes[0].rawValue;
                                if (validarCodigo(code)) {
                                    // Verificación doble para evitar falsos positivos
                                    if (code === lastResult) { countResults++; } else { lastResult = code; countResults = 0; }
                                    if (countResults >= 1) { buscarPrecio(code); return; }
                                }
                            }
                        }
                        scannerLoop = requestAnimationFrame(render);
                    };
                    render();
                } catch (err) {
                    startQuagga(); // Si falla el motor nativo, usamos Quagga
                }
            }

            // --- MOTOR ORIGINAL: QUAGGA (PARA IPHONE) ---
            function startQuagga() {
                const isAndroid = /Android/i.test(navigator.userAgent);
                Quagga.init({
                    inputStream: {
                        name: "Live",
                        type: "LiveStream",
                        target: document.querySelector('#interactive'),
                        constraints: { 
                            facingMode: "environment", 
                            width: isAndroid ? 1280 : 640, 
                            height: isAndroid ? 720 : 480 
                        },
                        area: { top: "20%", right: "10%", left: "10%", bottom: "20%" },
                    },
                    decoder: { readers: ["ean_reader", "upc_reader"] },
                    locate: true
                }, function(err) {
                    if (err) return;
                    Quagga.start();
                    initCameraCapabilities();
                });

                Quagga.onDetected(function(result) {
                    let code = result.codeResult.code;
                    if (!validarCodigo(code)) return; 
                    if (code === lastResult) { countResults++; } else { lastResult = code; countResults = 0; }
                    if (countResults >= 3) { buscarPrecio(code); }
                });
            }

            // --- CONTROLES DE CÁMARA (MANTENEMOS TU ZOOM Y LINTERNA) ---
            function initCameraCapabilities() {
                if (!track && typeof Quagga !== 'undefined') {
                    try { track = Quagga.CameraAccess.getActiveTrack(); } catch(e){}
                }
                if (!track) return;
                
                const capabilities = track.getCapabilities();
                if (capabilities.zoom) {
                    const zoomSlider = document.getElementById('zoom-slider');
                    zoomSlider.disabled = false;
                    zoomSlider.min = capabilities.zoom.min;
                    zoomSlider.max = capabilities.zoom.max;
                    zoomSlider.oninput = e => { track.applyConstraints({ advanced: [{ zoom: e.target.value }] }); };
                }
                if (capabilities.torch) { document.getElementById('btn-torch').disabled = false; }
            }

            function toggleTorch() {
                if (!track) return;
                const currentTorch = track.getSettings().torch || false;
                track.applyConstraints({ advanced: [{ torch: !currentTorch }] });
            }

            // --- INICIO INTELIGENTE ---
            window.onload = function() {
                if ('BarcodeDetector' in window) {
                    iniciarLectorNativo();
                } else {
                    startQuagga();
                }
            };
        </script>

        <style>
            #interactive video { width: 100%; height: 100%; object-fit: cover; }
            canvas.drawingBuffer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        </style>
